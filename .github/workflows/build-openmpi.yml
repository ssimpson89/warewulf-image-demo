name: Build and Publish OpenMPI Image

on:
  # Manual trigger only - this is a heavy build (~30-45 min) and is meant
  # for on-demand demo / customer-facing image rebuilds, not CI on every push.
  workflow_dispatch:
    inputs:
      openmpi_version:
        description: 'OpenMPI version to build from source (overrides Containerfile ARG default)'
        required: false
        default: '5.0.6'
        type: string

# Required for signing images with cosign
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Install Cosign for image signing
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.2'

      # Step 3: Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Extract metadata (tags, labels) for the image
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/warewulf-rockylinux-openmpi
          tags: |
            # :latest always points to the most recent manual build
            type=raw,value=latest

            # Version-pinned tag matches the OpenMPI version that was built
            type=raw,value=${{ inputs.openmpi_version }}

      # Step 6: Build and push the container image
      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: ./multi-stage/openmpi
          file: ./multi-stage/openmpi/Containerfile
          # Build for x86_64 only (comment out and uncomment line below for ARM64 support)
          platforms: linux/amd64
          # Uncomment for ARM64 support (comment out line above, roughly doubles build time)
          # platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPENMPI_VERSION=${{ inputs.openmpi_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 7: Sign the image with Cosign
      - name: Sign image with Cosign
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          echo "Signing image with digest: ${DIGEST}"
          cosign sign --yes \
            "ghcr.io/${{ github.repository_owner }}/warewulf-rockylinux-openmpi@${DIGEST}"

      # Step 8: Output the published image details
      - name: Output image details
        run: |
          echo "Image published successfully!"
          echo "OpenMPI version: ${{ inputs.openmpi_version }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo ""
          echo "Digest: ${{ steps.build-and-push.outputs.digest }}"
          echo ""
          echo "Pull with: docker pull ghcr.io/${{ github.repository_owner }}/warewulf-rockylinux-openmpi:latest"
          echo "Import to Warewulf: wwctl image import docker://ghcr.io/${{ github.repository_owner }}/warewulf-rockylinux-openmpi:latest rockylinux9-openmpi"
